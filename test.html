<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>Registro de Operación | Trade Mirror</title>
  <!-- Bootstrap 5 CSS + Icons -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Inter', system-ui, -apple-system, 'Segoe UI', Roboto, Helvetica, sans-serif;
      background: linear-gradient(145deg, #f4f7fc 0%, #eef2f8 100%);
      min-height: 100vh;
      padding: 2rem 1.5rem;
    }

    /* Contenedor principal más ancho para muchos campos */
    .register-trade-card {
      max-width: 1100px;
      width: 100%;
      margin: 0 auto;
      background: #ffffff;
      border-radius: 36px;
      box-shadow: 0 20px 35px -12px rgba(0, 0, 0, 0.08), 0 1px 2px rgba(0, 0, 0, 0.02);
      padding: 2rem 2rem 2.2rem;
      transition: all 0.2s ease;
      border: 1px solid rgba(226, 232, 240, 0.7);
    }

    /* Encabezado */
    .register-header {
      text-align: center;
      margin-bottom: 1.8rem;
    }

    .brand-icon-small {
      background: rgba(44, 125, 160, 0.08);
      width: 56px;
      height: 56px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      border-radius: 28px;
      margin-bottom: 1rem;
    }

    .brand-icon-small i {
      font-size: 2rem;
      color: #2c7da0;
    }

    .register-title {
      font-weight: 650;
      font-size: 1.8rem;
      letter-spacing: -0.3px;
      background: linear-gradient(135deg, #1f5e7e, #2c7da0);
      background-clip: text;
      -webkit-background-clip: text;
      color: transparent;
      margin-bottom: 0.3rem;
    }

    .register-sub {
      color: #5b6e8c;
      font-size: 0.85rem;
      border-left: 2px solid #2c7da0;
      padding-left: 0.75rem;
      display: inline-block;
      margin-top: 0.25rem;
    }

    /* Secciones internas */
    .form-section {
      margin-bottom: 1.8rem;
      border-bottom: 1px solid #edf2f7;
      padding-bottom: 1rem;
    }

    .section-title {
      font-size: 0.85rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      color: #2c7da0;
      margin-bottom: 1rem;
      display: flex;
      align-items: center;
      gap: 0.5rem;
    }

    .section-title i {
      font-size: 1rem;
    }

    /* Campos minimalistas */
    .form-group {
      margin-bottom: 1.2rem;
    }

    .input-icon-group {
      position: relative;
    }

    .input-icon-group .form-control-custom,
    .input-icon-group .form-select-custom {
      padding-left: 2.8rem;
    }

    .form-control-custom, .form-select-custom {
      width: 100%;
      border: 1px solid #e2e8f0;
      border-radius: 18px;
      padding: 0.7rem 1rem;
      font-size: 0.9rem;
      background-color: #ffffff;
      transition: all 0.2s ease;
      box-shadow: 0 1px 2px rgba(0,0,0,0.02);
    }

    .form-control-custom:focus, .form-select-custom:focus {
      border-color: #2c7da0;
      box-shadow: 0 0 0 4px rgba(44, 125, 160, 0.12);
      outline: none;
    }

    .input-icon {
      position: absolute;
      left: 1rem;
      top: 50%;
      transform: translateY(-50%);
      color: #8e9eae;
      font-size: 1.1rem;
      pointer-events: none;
      transition: color 0.2s;
    }

    .input-icon-group:focus-within .input-icon {
      color: #2c7da0;
    }

    /* Radio group tipo operación */
    .type-radio-group {
      display: flex;
      gap: 1rem;
      flex-wrap: wrap;
    }

    .type-radio {
      display: flex;
      align-items: center;
      gap: 0.5rem;
      cursor: pointer;
      font-size: 0.85rem;
      font-weight: 500;
      padding: 0.4rem 1rem;
      border-radius: 40px;
      background: #f8fafc;
      border: 1px solid #e2e8f0;
      transition: all 0.2s;
    }

    .type-radio input {
      accent-color: #2c7da0;
      width: 1rem;
      height: 1rem;
      margin: 0;
    }

    .type-radio.selected-buy {
      background: #e0f2e9;
      border-color: #2c7da0;
      color: #1e7b5c;
    }

    .type-radio.selected-sell {
      background: #ffe8e6;
      border-color: #b34a3c;
      color: #b34a3c;
    }

    /* Botón principal */
    .btn-register {
      background: linear-gradient(95deg, #1f5e7e 0%, #2c7da0 100%);
      border: none;
      padding: 0.8rem;
      font-weight: 600;
      border-radius: 40px;
      font-size: 0.95rem;
      transition: transform 0.15s, box-shadow 0.2s;
      color: white;
      width: 100%;
      margin-top: 0.5rem;
    }

    .btn-register:hover {
      background: linear-gradient(95deg, #184f6b 0%, #236b8c 100%);
      transform: translateY(-1px);
      box-shadow: 0 8px 20px rgba(28, 95, 120, 0.2);
    }

    /* Enlace a historial */
    .history-link {
      text-align: center;
      margin-top: 1.5rem;
      font-size: 0.85rem;
      color: #5b6e8c;
    }
    .history-link a {
      color: #2c7da0;
      text-decoration: none;
      font-weight: 500;
    }
    .history-link a:hover {
      text-decoration: underline;
    }

    /* Responsive */
    @media (max-width: 768px) {
      .register-trade-card {
        padding: 1.5rem;
      }
      .type-radio-group {
        flex-direction: column;
        gap: 0.6rem;
      }
    }
  </style>
</head>
<body>

<div class="register-trade-card">
  <div class="register-header">
    <div class="brand-icon-small">
      <i class="bi bi-clipboard-data"></i>
    </div>
    <h1 class="register-title">Registrar operación</h1>
    <div class="register-sub">trade mirror · registro completo de trades</div>
  </div>

  <form id="tradeForm" action="#" method="post">
    
    <!-- SECCIÓN 1: Datos esenciales -->
    <div class="form-section">
      <div class="section-title"><i class="bi bi-info-circle"></i> Datos esenciales</div>
      <div class="row g-3">
        <div class="col-md-6">
          <div class="input-icon-group">
            <i class="bi bi-currency-exchange input-icon"></i>
            <select class="form-select form-select-custom" id="pair" required>
              <option value="" disabled selected>Par / Activo *</option>
              <option value="BTC/USD">BTC/USD - Bitcoin</option>
              <option value="ETH/USD">ETH/USD - Ethereum</option>
              <option value="EUR/USD">EUR/USD - Euro/Dólar</option>
              <option value="SOL/USD">SOL/USD - Solana</option>
              <option value="ADA/USD">ADA/USD - Cardano</option>
              <option value="DOGE/USD">DOGE/USD - Dogecoin</option>
              <option value="XRP/USD">XRP/USD - Ripple</option>
              <option value="LINK/USD">LINK/USD - Chainlink</option>
              <option value="MATIC/USD">MATIC/USD - Polygon</option>
            </select>
          </div>
        </div>
        <div class="col-md-6">
          <div class="form-group mb-0">
            <label style="font-size: 0.75rem; font-weight: 500; color: #5b6e8c; margin-bottom: 0.3rem;">Tipo de operación *</label>
            <div class="type-radio-group" id="typeGroup">
              <label class="type-radio" id="buyLabel">
                <input type="radio" name="tradeType" value="compra" checked> <i class="bi bi-arrow-up-short"></i> Compra
              </label>
              <label class="type-radio" id="sellLabel">
                <input type="radio" name="tradeType" value="venta"> <i class="bi bi-arrow-down-short"></i> Venta
              </label>
            </div>
          </div>
        </div>
      </div>
    </div>

    <!-- SECCIÓN 2: Cantidades y precios (campos numéricos) -->
    <div class="form-section">
      <div class="section-title"><i class="bi bi-calculator"></i> Cantidades y precios</div>
      <div class="row g-3">
        <div class="col-md-4">
          <div class="input-icon-group">
            <i class="bi bi-database input-icon"></i>
            <input type="number" step="any" class="form-control form-control-custom" id="quantity" placeholder="Cantidad *" required>
          </div>
        </div>
        <div class="col-md-4">
          <div class="input-icon-group">
            <i class="bi bi-tag input-icon"></i>
            <input type="number" step="any" class="form-control form-control-custom" id="entryPrice" placeholder="Precio entrada (USD) *" required>
          </div>
        </div>
        <div class="col-md-4">
          <div class="input-icon-group">
            <i class="bi bi-flag input-icon"></i>
            <input type="number" step="any" class="form-control form-control-custom" id="exitPrice" placeholder="Precio salida (opcional)">
          </div>
        </div>
      </div>
      <div class="row g-3 mt-1">
        <div class="col-md-6">
          <div class="input-icon-group">
            <i class="bi bi-percent input-icon"></i>
            <input type="number" step="0.01" class="form-control form-control-custom" id="commission" placeholder="Comisión (%) o monto fijo">
          </div>
        </div>
        <div class="col-md-6">
          <div class="input-icon-group">
            <i class="bi bi-arrow-left-right input-icon"></i>
            <input type="number" step="0.01" class="form-control form-control-custom" id="slippage" placeholder="Slippage permitido (%)">
          </div>
        </div>
      </div>
    </div>

    <!-- SECCIÓN 3: Gestión de riesgos (Take Profit / Stop Loss) -->
    <div class="form-section">
      <div class="section-title"><i class="bi bi-shield-shaded"></i> Gestión de riesgos</div>
      <div class="row g-3">
        <div class="col-md-6">
          <div class="input-icon-group">
            <i class="bi bi-arrow-up-circle input-icon"></i>
            <input type="number" step="any" class="form-control form-control-custom" id="takeProfit" placeholder="Take Profit (precio)">
          </div>
        </div>
        <div class="col-md-6">
          <div class="input-icon-group">
            <i class="bi bi-arrow-down-circle input-icon"></i>
            <input type="number" step="any" class="form-control form-control-custom" id="stopLoss" placeholder="Stop Loss (precio)">
          </div>
        </div>
      </div>
      <div class="row g-3 mt-1">
        <div class="col-md-6">
          <div class="input-icon-group">
            <i class="bi bi-graph-up input-icon"></i>
            <input type="number" step="0.1" class="form-control form-control-custom" id="leverage" placeholder="Apalancamiento (ej: 1, 2, 5...)" value="1">
          </div>
        </div>
        <div class="col-md-6">
          <div class="input-icon-group">
            <i class="bi bi-clock input-icon"></i>
            <select class="form-select form-select-custom" id="orderType">
              <option value="market">Market (ejecución inmediata)</option>
              <option value="limit">Limit (orden límite)</option>
              <option value="stop">Stop (stop market)</option>
              <option value="stop_limit">Stop limit</option>
            </select>
          </div>
        </div>
      </div>
    </div>

    <!-- SECCIÓN 4: Información adicional y contexto -->
    <div class="form-section">
      <div class="section-title"><i class="bi bi-geo-alt"></i> Contexto y plataforma</div>
      <div class="row g-3">
        <div class="col-md-6">
          <div class="input-icon-group">
            <i class="bi bi-building input-icon"></i>
            <select class="form-select form-select-custom" id="platform">
              <option value="" disabled selected>Plataforma / Broker *</option>
              <option value="Binance">Binance</option>
              <option value="Coinbase">Coinbase</option>
              <option value="Kraken">Kraken</option>
              <option value="Bybit">Bybit</option>
              <option value="FTX (demo)">FTX (demo)</option>
              <option value="Interactive Brokers">Interactive Brokers</option>
              <option value="Otro">Otro</option>
            </select>
          </div>
        </div>
        <div class="col-md-6">
          <div class="input-icon-group">
            <i class="bi bi-tags input-icon"></i>
            <input type="text" class="form-control form-control-custom" id="tags" placeholder="Etiquetas (scalping, swing, etc)">
          </div>
        </div>
      </div>
      <div class="row g-3 mt-1">
        <div class="col-md-6">
          <div class="input-icon-group">
            <i class="bi bi-calendar-event input-icon"></i>
            <input type="datetime-local" class="form-control form-control-custom" id="tradeDate" required>
          </div>
        </div>
        <div class="col-md-6">
          <div class="input-icon-group">
            <i class="bi bi-bar-chart-steps input-icon"></i>
            <select class="form-select form-select-custom" id="strategy">
              <option value="" disabled selected>Estrategia utilizada</option>
              <option value="Trend following">Trend following</option>
              <option value="Scalping">Scalping</option>
              <option value="Swing trading">Swing trading</option>
              <option value="Arbitraje">Arbitraje</option>
              <option value="Martingala">Martingala</option>
              <option value="Grid trading">Grid trading</option>
            </select>
          </div>
        </div>
      </div>
    </div>

    <!-- SECCIÓN 5: Estado y notas -->
    <div class="form-section">
      <div class="section-title"><i class="bi bi-chat-dots"></i> Estado y observaciones</div>
      <div class="row g-3">
        <div class="col-md-6">
          <div class="input-icon-group">
            <i class="bi bi-check-circle input-icon"></i>
            <select class="form-select form-select-custom" id="tradeStatus">
              <option value="abierta">Abierta</option>
              <option value="cerrada_ganancia">Cerrada (ganancia)</option>
              <option value="cerrada_perdida">Cerrada (pérdida)</option>
              <option value="pendiente">Pendiente de ejecución</option>
            </select>
          </div>
        </div>
        <div class="col-md-6">
          <div class="input-icon-group">
            <i class="bi bi-emoji-smile input-icon"></i>
            <input type="text" class="form-control form-control-custom" id="sentiment" placeholder="Sentimiento (alcista / bajista / neutral)">
          </div>
        </div>
      </div>
      <div class="form-group mt-2">
        <div class="input-icon-group">
          <i class="bi bi-pencil-square input-icon" style="top: 1.2rem;"></i>
          <textarea class="form-control form-control-custom" id="notes" rows="3" placeholder="Notas adicionales, análisis, contexto de la operación..."></textarea>
        </div>
      </div>
    </div>

    <!-- Botón de envío -->
    <button type="submit" class="btn btn-register">
      <i class="bi bi-save2 me-2"></i> Registrar operación
    </button>

    <div class="history-link">
      <i class="bi bi-arrow-return-left me-1"></i> <a href="#" id="backToHistory">Volver al historial de trades</a>
    </div>
  </form>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
<script>
  (function() {
    // Elementos
    const form = document.getElementById('tradeForm');
    const radioCompra = document.querySelector('input[value="compra"]');
    const radioVenta = document.querySelector('input[value="venta"]');
    const buyLabel = document.getElementById('buyLabel');
    const sellLabel = document.getElementById('sellLabel');
    const backLink = document.getElementById('backToHistory');
    const tradeDateInput = document.getElementById('tradeDate');

    // Estilo visual de los radio buttons
    function updateRadioStyles() {
      if (radioCompra.checked) {
        buyLabel.classList.add('selected-buy');
        sellLabel.classList.remove('selected-sell');
        buyLabel.style.background = '#e0f2e9';
        sellLabel.style.background = '#f8fafc';
        sellLabel.style.borderColor = '#e2e8f0';
        buyLabel.style.borderColor = '#2c7da0';
      } else {
        sellLabel.classList.add('selected-sell');
        buyLabel.classList.remove('selected-buy');
        sellLabel.style.background = '#ffe8e6';
        sellLabel.style.borderColor = '#b34a3c';
        buyLabel.style.background = '#f8fafc';
        buyLabel.style.borderColor = '#e2e8f0';
      }
    }
    radioCompra.addEventListener('change', updateRadioStyles);
    radioVenta.addEventListener('change', updateRadioStyles);
    updateRadioStyles();

    // Preestablecer fecha/hora actual
    function setDefaultDateTime() {
      const now = new Date();
      const year = now.getFullYear();
      const month = String(now.getMonth() + 1).padStart(2, '0');
      const day = String(now.getDate()).padStart(2, '0');
      const hours = String(now.getHours()).padStart(2, '0');
      const minutes = String(now.getMinutes()).padStart(2, '0');
      tradeDateInput.value = `${year}-${month}-${day}T${hours}:${minutes}`;
    }
    setDefaultDateTime();

    // Notificación flotante minimalista
    function showMessage(message, type = 'success') {
      const existing = document.querySelector('.floating-toast-register-op');
      if (existing) existing.remove();
      const toast = document.createElement('div');
      toast.className = `floating-toast-register-op alert shadow`;
      toast.style.position = 'fixed';
      toast.style.bottom = '24px';
      toast.style.left = '50%';
      toast.style.transform = 'translateX(-50%)';
      toast.style.zIndex = '9999';
      toast.style.minWidth = '260px';
      toast.style.maxWidth = '90vw';
      toast.style.textAlign = 'center';
      toast.style.backgroundColor = type === 'success' ? '#e2f3e4' : '#fff3e0';
      toast.style.borderLeft = type === 'success' ? '4px solid #2c7da0' : '4px solid #e6a017';
      toast.style.borderRadius = '20px';
      toast.style.padding = '0.7rem 1rem';
      toast.style.fontSize = '0.85rem';
      toast.style.fontWeight = '500';
      toast.style.color = '#1e2a3a';
      const icon = type === 'success' ? '<i class="bi bi-check-circle-fill me-2" style="color:#2c7da0;"></i>' : '<i class="bi bi-info-circle-fill me-2" style="color:#e6a017;"></i>';
      toast.innerHTML = `${icon} ${message}`;
      document.body.appendChild(toast);
      setTimeout(() => toast.remove(), 2800);
    }

    // Validación y envío simulado
    form.addEventListener('submit', function(e) {
      e.preventDefault();

      // Validar campos requeridos
      const pair = document.getElementById('pair').value;
      const quantity = parseFloat(document.getElementById('quantity').value);
      const entryPrice = parseFloat(document.getElementById('entryPrice').value);
      const platform = document.getElementById('platform').value;
      const tradeDate = document.getElementById('tradeDate').value;

      if (!pair) { showMessage("Selecciona un par de trading.", "warning"); return; }
      if (isNaN(quantity) || quantity <= 0) { showMessage("Cantidad válida (mayor a 0).", "warning"); document.getElementById('quantity').focus(); return; }
      if (isNaN(entryPrice) || entryPrice <= 0) { showMessage("Precio de entrada válido.", "warning"); document.getElementById('entryPrice').focus(); return; }
      if (!platform) { showMessage("Selecciona la plataforma o broker.", "warning"); return; }
      if (!tradeDate) { showMessage("Selecciona la fecha/hora.", "warning"); return; }

      // Recopilar datos (más de 15 campos)
      const tradeType = document.querySelector('input[name="tradeType"]:checked').value;
      const exitPrice = document.getElementById('exitPrice').value;
      const commission = document.getElementById('commission').value;
      const slippage = document.getElementById('slippage').value;
      const takeProfit = document.getElementById('takeProfit').value;
      const stopLoss = document.getElementById('stopLoss').value;
      const leverage = document.getElementById('leverage').value;
      const orderType = document.getElementById('orderType').value;
      const tags = document.getElementById('tags').value;
      const strategy = document.getElementById('strategy').value;
      const tradeStatus = document.getElementById('tradeStatus').value;
      const sentiment = document.getElementById('sentiment').value;
      const notes = document.getElementById('notes').value;

      // Simular objeto de operación completa
      const newTrade = {
        id: Math.floor(Math.random() * 10000) + 1000,
        par: pair,
        tipo: tradeType,
        cantidad: quantity,
        precioEntrada: entryPrice,
        precioSalida: exitPrice || 'N/A',
        comision: commission || '0',
        slippage: slippage || '0',
        takeProfit: takeProfit || 'N/A',
        stopLoss: stopLoss || 'N/A',
        apalancamiento: leverage || '1',
        tipoOrden: orderType,
        plataforma: platform,
        etiquetas: tags || '—',
        estrategia: strategy || 'No especificada',
        estado: tradeStatus,
        sentimiento: sentiment || 'neutral',
        fecha: tradeDate.replace('T', ' '),
        notas: notes || 'Sin notas'
      };

      console.log('Operación registrada (demo):', newTrade);
      showMessage(`✅ Operación registrada: ${tradeType.toUpperCase()} ${quantity} ${pair} @ $${entryPrice}`, "success");

      // Opcional: limpiar algunos campos para nuevo registro (manteniendo par y tipo)
      document.getElementById('quantity').value = '';
      document.getElementById('entryPrice').value = '';
      document.getElementById('exitPrice').value = '';
      document.getElementById('commission').value = '';
      document.getElementById('slippage').value = '';
      document.getElementById('takeProfit').value = '';
      document.getElementById('stopLoss').value = '';
      document.getElementById('leverage').value = '1';
      document.getElementById('tags').value = '';
      document.getElementById('sentiment').value = '';
      document.getElementById('notes').value = '';
      setDefaultDateTime();
      // No reseteamos el par ni el tipo para agilidad
    });

    backLink.addEventListener('click', (e) => {
      e.preventDefault();
      showMessage("🔁 Demo: Redirigiendo al historial de trades", "info");
      // Simular navegación: window.location.href = 'historial.html';
    });
  })();
</script>
</body>
</html>
